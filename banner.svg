<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a14"/><stop offset="100%" stop-color="#0e0e22"/></linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"><animate attributeName="stop-color" values="#818cf8;#2dd4bf;#818cf8" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="60%" stop-color="#2dd4bf"><animate attributeName="stop-color" values="#2dd4bf;#818cf8;#2dd4bf" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#6366f1"><animate attributeName="stop-color" values="#6366f1;#14b8a6;#6366f1" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <filter id="glo"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="orb"><feGaussianBlur stdDeviation="55"/></filter>
    <clipPath id="clip"><rect width="1200" height="360"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
  <rect width="1200" height="360" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#818cf8" stroke-width="0.4" opacity="0.05">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="300" y1="0" x2="300" y2="360"/><line x1="600" y1="0" x2="600" y2="360"/><line x1="900" y1="0" x2="900" y2="360"/>
  </g>
  <!-- orbs -->
  <ellipse cx="220" cy="180" rx="220" ry="170" fill="#6366f1" opacity="0.13" filter="url(#orb)"><animateTransform attributeName="transform" type="translate" values="0,0;20,-12;0,0" dur="7s" repeatCount="indefinite"/></ellipse>
  <ellipse cx="980" cy="180" rx="195" ry="155" fill="#14b8a6" opacity="0.1" filter="url(#orb)"><animateTransform attributeName="transform" type="translate" values="0,0;-18,10;0,0" dur="7s" repeatCount="indefinite" begin="2s"/></ellipse>
  <!-- particles -->
  <circle cx="105" cy="88" r="1.5" fill="#818cf8" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="88;78;88" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="1095" cy="105" r="1" fill="#2dd4bf" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="168" cy="305" r="1.5" fill="#818cf8" opacity="0.3"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="1040" cy="290" r="1" fill="#2dd4bf" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite" begin="2s"/></circle>
  <circle cx="420" cy="42" r="1" fill="#f59e0b" opacity="0.35"><animate attributeName="opacity" values="0.35;0.7;0.35" dur="5s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle cx="800" cy="325" r="1.5" fill="#818cf8" opacity="0.3"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.8s" repeatCount="indefinite" begin="3s"/></circle>
  <!-- LEFT card 1 — Risk Score 15 (Sutter Health time-barred) -->
  <rect x="28" y="90" width="220" height="108" rx="14" fill="#0f1628" stroke="#6366f1" stroke-width="0.7" stroke-opacity="0.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.2s"/></rect>
  <text x="50" y="118" font-size="9" fill="#818cf8" font-weight="700" letter-spacing="1.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.4s"/>RISK SCORE</text>
  <text x="50" y="166" font-size="48" fill="#14b8a6" font-weight="800" filter="url(#glo)" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.6s"/>15</text>
  <text x="122" y="166" font-size="14" fill="#475569" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.6s"/>/100</text>
  <rect x="50" y="178" width="180" height="16" rx="4" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="0.4" stroke-opacity="0.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.8s"/></rect>
  <text x="58" y="190" font-size="10" fill="#34d399" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.8s"/>✓ Maximum leverage position</text>
  <!-- LEFT card 2 — Status Time-Barred (Sutter Health) -->
  <rect x="28" y="214" width="220" height="88" rx="14" fill="#0f1628" stroke="#14b8a6" stroke-width="0.7" stroke-opacity="0.45" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.0s"/></rect>
  <text x="50" y="240" font-size="9" fill="#14b8a6" font-weight="700" letter-spacing="1.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.1s"/>STATUS</text>
  <text x="50" y="268" font-size="17" fill="#86efac" font-weight="700" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.2s"/>Time-Barred</text>
  <text x="50" y="288" font-size="10" fill="#475569" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.2s"/>SOL expired Jan 2024 · Cannot be sued</text>
  <!-- RIGHT card 1 — Settlement Range (Capital One 30-50%) -->
  <rect x="952" y="90" width="220" height="108" rx="14" fill="#0f1628" stroke="#6366f1" stroke-width="0.7" stroke-opacity="0.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.3s"/></rect>
  <text x="974" y="118" font-size="9" fill="#818cf8" font-weight="700" letter-spacing="1.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.5s"/>SETTLEMENT RANGE</text>
  <text x="974" y="157" font-size="22" fill="#e2e8f0" font-weight="800" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.7s"/>$1,436 – $2,393</text>
  <text x="974" y="175" font-size="10" fill="#64748b" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.7s"/>30–50% of $4,785.43 claimed</text>
  <text x="974" y="192" font-size="10" fill="#34d399" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="0.9s"/>Open: $1,436 · Walkaway: $2,393</text>
  <!-- RIGHT card 2 — FDCPA Violations (2 on Capital One, 1 on Sutter) -->
  <rect x="952" y="214" width="220" height="88" rx="14" fill="#0f1628" stroke="#f59e0b" stroke-width="0.7" stroke-opacity="0.45" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.0s"/></rect>
  <text x="974" y="240" font-size="9" fill="#f59e0b" font-weight="700" letter-spacing="1.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.1s"/>FDCPA VIOLATIONS</text>
  <text x="974" y="270" font-size="30" fill="#fbbf24" font-weight="800" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.2s"/>3 Found</text>
  <text x="974" y="290" font-size="10" fill="#475569" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="1.2s"/>§ 1692c · § 1692g · § 1692e Reg F</text>
  <!-- Center title -->
  <text x="600" y="148" font-size="86" font-weight="800" text-anchor="middle" fill="url(#tg)" filter="url(#glo)" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" fill="freeze"/>DebtWise</text>
  <text x="600" y="188" font-size="18" text-anchor="middle" fill="#94a3b8" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.4s"/>AI-Powered Debt Negotiation Copilot</text>
  <!-- Pills -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.9s"/>
    <rect x="424" y="210" width="118" height="24" rx="12" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="483" y="226" font-size="10" font-weight="600" text-anchor="middle" fill="#818cf8">Know Your Rights</text>
    <rect x="552" y="210" width="96" height="24" rx="12" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="600" y="226" font-size="10" font-weight="600" text-anchor="middle" fill="#2dd4bf">Negotiate Smart</text>
    <rect x="658" y="210" width="118" height="24" rx="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="717" y="226" font-size="10" font-weight="600" text-anchor="middle" fill="#fbbf24">Settle for Less</text>
  </g>
  <!-- Stack line -->
  <text x="600" y="282" font-family="JetBrains Mono,ui-monospace,monospace" font-size="11" text-anchor="middle" fill="#334155" letter-spacing="1.5" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.3s"/>TypeScript · React 18 · Express 4 · Socket.IO · Zod · Zustand · TanStack Query</text>
  <!-- Animated divider line -->
  <line x1="460" y1="302" x2="460" y2="302" stroke="url(#btn)" stroke-width="0.7" opacity="0.8"><animate attributeName="x2" values="460;740" dur="0.6s" fill="freeze" begin="1.5s"/></line>
  <!-- Pulse ring -->
  <circle cx="600" cy="76" r="5" fill="none" stroke="#6366f1" stroke-width="0.6"><animate attributeName="r" values="5;22;5" dur="3s" repeatCount="indefinite" begin="1.8s"/><animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite" begin="1.8s"/></circle>
  </g>
</svg>
